<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chroma — Color Palette Lab</title>

    <!-- Fonts: Fraunces (editorial display) · Hanken Grotesk (body) · JetBrains Mono (code) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        display: ['Fraunces', 'Georgia', 'serif'],
                        sans: ['Hanken Grotesk', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
                    },
                    colors: {
                        border: 'hsl(var(--border))',
                        input: 'hsl(var(--input))',
                        ring: 'hsl(var(--ring))',
                        background: 'hsl(var(--background))',
                        foreground: 'hsl(var(--foreground))',
                        accent: {
                            DEFAULT: 'hsl(var(--accent))',
                            foreground: 'hsl(var(--accent-foreground))',
                        },
                        muted: {
                            DEFAULT: 'hsl(var(--muted))',
                            foreground: 'hsl(var(--muted-foreground))',
                        },
                        card: {
                            DEFAULT: 'hsl(var(--card))',
                            foreground: 'hsl(var(--card-foreground))',
                        },
                    },
                    borderRadius: {
                        lg: 'var(--radius)',
                        md: 'calc(var(--radius) - 2px)',
                        sm: 'calc(var(--radius) - 4px)',
                    },
                }
            }
        }
    </script>

    <!-- React + ReactDOM + Babel (in-browser JSX) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Editorial "color lab": warm paper + ink, a single vermilion accent. */
        :root {
            --background: 38 36% 97%;      /* warm paper  */
            --foreground: 30 9% 13%;       /* ink         */
            --card: 40 40% 99%;
            --card-foreground: 30 9% 13%;
            --muted: 36 18% 92%;
            --muted-foreground: 30 6% 40%;
            --accent: 13 84% 53%;          /* vermilion   */
            --accent-foreground: 40 40% 99%;
            --border: 33 16% 87%;
            --input: 33 16% 87%;
            --ring: 13 84% 53%;
            --radius: 0.5rem;
            --paper-line: 33 16% 90%;
        }

        .dark {
            --background: 28 9% 9%;        /* warm ink    */
            --foreground: 38 24% 91%;
            --card: 28 9% 12%;
            --card-foreground: 38 24% 91%;
            --muted: 28 7% 17%;
            --muted-foreground: 36 9% 60%;
            --accent: 13 86% 58%;
            --accent-foreground: 28 9% 9%;
            --border: 28 7% 19%;
            --input: 28 7% 19%;
            --ring: 13 86% 58%;
            --paper-line: 28 7% 15%;
        }

        html { -webkit-text-size-adjust: 100%; }

        body {
            /* Faint blueprint grid for atmosphere — subtle, paper-like. */
            background-color: hsl(var(--background));
            background-image:
                linear-gradient(hsl(var(--paper-line) / 0.6) 1px, transparent 1px),
                linear-gradient(90deg, hsl(var(--paper-line) / 0.6) 1px, transparent 1px);
            background-size: 28px 28px;
            background-position: -1px -1px;
        }

        * {
            transition-property: color, background-color, border-color, box-shadow, transform, opacity;
            transition-timing-function: cubic-bezier(0.2, 0.7, 0.2, 1);
            transition-duration: 180ms;
        }

        ::-webkit-scrollbar { width: 11px; height: 11px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: hsl(var(--muted-foreground) / 0.28);
            border: 3px solid hsl(var(--background));
            border-radius: 999px;
        }
        ::-webkit-scrollbar-thumb:hover { background: hsl(var(--muted-foreground) / 0.45); }

        /* Small-caps mono section labels */
        .eyebrow {
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            font-size: 0.6875rem;
            font-weight: 500;
        }

        .upload-zone { transition: all 0.2s cubic-bezier(0.2, 0.7, 0.2, 1); }
        .upload-zone.drag-over {
            border-color: hsl(var(--accent));
            background-color: hsl(var(--accent) / 0.06);
        }

        .swatch { transition: transform 0.18s cubic-bezier(0.2, 0.7, 0.2, 1), box-shadow 0.18s; }
        .swatch:hover { transform: translateY(-3px); }

        @keyframes riseIn {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .rise-in { animation: riseIn 0.5s cubic-bezier(0.2, 0.7, 0.2, 1) both; }

        @keyframes inkUnderline {
            from { transform: scaleX(0); }
            to   { transform: scaleX(1); }
        }

        *:focus-visible {
            outline: none;
            box-shadow: 0 0 0 2px hsl(var(--background)), 0 0 0 4px hsl(var(--ring));
        }

        /* Range inputs in the accent color */
        input[type="range"] { accent-color: hsl(var(--accent)); }
        /* Native color input — trim the chrome */
        input[type="color"] { -webkit-appearance: none; appearance: none; background: transparent; cursor: pointer; padding: 0; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: calc(var(--radius) - 2px); }
    </style>
</head>
<body class="font-sans text-foreground antialiased">
    <div id="root"></div>
    <script type="text/babel" src="App.jsx"></script>
</body>
</html>
